<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte NOVLABSA - Vista Optimizada</title>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto', sans-serif; margin: 10px; background-color: #f4f4f9; }
        .contenedor-tabla { background: white; padding: 15px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); overflow-x: auto; height: 88vh; }
        
        table { border-collapse: collapse; width: 100%; min-width: 2400px; table-layout: fixed; }
        
        thead th { position: sticky; top: 0; z-index: 10; }
        .h-morado { background: #CC66FF; color: white; font-family: 'Montserrat'; font-size: 7pt; font-weight: bold; text-align: center; border: 0.5pt solid #fff; padding: 10px 2px; }
        .h-azul { background: #4472C4; color: white; font-family: 'Montserrat'; font-size: 7pt; border: 0.5pt solid #fff; }

        .celda { font-size: 7.5pt; color: #000; text-align: center; vertical-align: middle; border: 0.5pt solid #ccc; padding: 4px 2px; word-wrap: break-word; }
        .izquierda { text-align: left; padding-left: 5px; }
        
        /* Colores Matriz */
        .matriz-suelo { background-color: #FFC000 !important; font-weight: bold; }
        .matriz-agua { background-color: #00B0F0 !important; color: white !important; font-weight: bold; }
        
        /* Estilos de Status */
        .status-rojo { background-color: #FF0000 !important; color: white !important; font-weight: bold; }
        .status-verde { background-color: #28a745 !important; color: white !important; font-weight: bold; }
        .resaltado-final { background-color: #66cf40; font-weight: bold; }

        #mensaje { color: #7030A0; font-weight: bold; text-align: center; margin: 10px; }
    </style>
</head>
<body>

<div class="contenedor-tabla">
    <div id="mensaje">Sincronizando datos...</div>
    <table id="tabla-novlabsa" style="display:none;">
        <thead id="cabecera-generada"></thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>
</div>

<script>
    const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSIJI6LlRVJeFDAZhLdb6VDu72yf1x39lbzYlh_JgX8UzES8RPWWklLoDPINWAqggRQ6hXllOKC6Y9K/pub?output=csv" + "&cachebust=" + new Date().getTime();

    // Columnas A-AC (0-28), AI (34), AP (41)
    const indicesAMostrar = [];
    for(let i=0; i<=28; i++) indicesAMostrar.push(i);
    indicesAMostrar.push(34); 
    indicesAMostrar.push(41); 

    async function cargarDatos() {
        try {
            const respuesta = await fetch(URL_CSV);
            if (!respuesta.ok) throw new Error("Error de red");
            const contenido = await respuesta.text();

            Papa.parse(contenido, {
                header: false,
                skipEmptyLines: true,
                complete: function(resultado) {
                    generarEncabezados(resultado.data[0]);
                    renderizarTabla(resultado.data);
                }
            });
        } catch (error) {
            document.getElementById('mensaje').innerHTML = "Error de conexión. Asegúrate de usar Live Server.";
        }
    }

    function generarEncabezados(titulos) {
        const thead = document.getElementById('cabecera-generada');
        let htmlHeader = "<tr>";
        indicesAMostrar.forEach(idx => {
            let nombreCol = titulos[idx] || `Col ${idx+1}`;
            let clase = (idx < 17) ? "h-morado" : "h-azul";
            let ancho = (idx === 3 || idx === 4) ? "180px" : (idx === 9) ? "220px" : (idx === 0) ? "35px" : "80px";
            if (idx >= 17 && idx <= 24) ancho = "45px";

            htmlHeader += `<th class="${clase}" style="width: ${ancho};">${nombreCol}</th>`;
        });
        htmlHeader += "</tr>";
        thead.innerHTML = htmlHeader;
    }

    function renderizarTabla(filas) {
        const tablaBody = document.getElementById('cuerpo-tabla');
        document.getElementById('mensaje').style.display = 'none';
        document.getElementById('tabla-novlabsa').style.display = 'table';
        tablaBody.innerHTML = ""; 

        for (let i = 1; i < filas.length; i++) {
            const c = filas[i];
            
            // Validar que la fila tenga datos en OTM
            if (!c[1] || c[1].trim() === "" || c[1] === "-1") continue;

            const tr = document.createElement('tr');
            
            // Lógica para color de Entregado
            const entregado = (c[16] || "").trim().toUpperCase();
            let claseEntregado = (entregado === "NO") ? "status-rojo" : (entregado === "SI" || entregado === "SÍ") ? "status-verde" : "";

            let htmlFila = "";
            indicesAMostrar.forEach(j => {
                let valor = c[j] || '';
                let clasesCelda = "celda";
                
                // 1. Filtro Días de demora (Índice 15): No mostrar -1
                if (j === 15 && valor.toString().trim() === "-1") {
                    valor = "";
                }

                // 2. Formato de porcentajes (Avances)
                if (valor !== "" && !isNaN(valor) && valor > 0 && valor < 1 && j >= 28) {
                    valor = (parseFloat(valor) * 100).toFixed(0) + "%";
                }

                // 3. Estilos de Matriz (Índice 7)
                if (j === 7) {
                    const txt = valor.toLowerCase();
                    if (txt.includes("suelo")) clasesCelda += " matriz-suelo";
                    else if (txt.includes("agua")) clasesCelda += " matriz-agua";
                }

                // 4. Alineación y Colores Especiales
                if ([3, 4, 9].includes(j)) clasesCelda += " izquierda";
                
                // Columna Entregado (Índice 16)
                if (j === 16) clasesCelda += " " + claseEntregado;
                
                // Columnas finales (Índice 34 en adelante)
                if (j === 28 || j === 41) clasesCelda += " resaltado-final";

                htmlFila += `<td class="${clasesCelda}">${valor}</td>`;
            });
            
            tr.innerHTML = htmlFila;
            tablaBody.appendChild(tr);
        }
    }

    window.onload = cargarDatos;
</script>

</body>
</html>
