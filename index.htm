<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte NOVLABSA</title>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto', sans-serif; margin: 10px; background-color: #f4f4f9; }
        .contenedor-tabla { background: white; padding: 15px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; min-width: 1400px; table-layout: fixed; }
        
        .h-morado { background: #CC66FF; color: white; font-family: 'Montserrat'; font-size: 7.5pt; font-weight: bold; text-align: center; border: 0.5pt solid #fff; padding: 10px 2px; }
        .h-gris { background: #ADADAD; color: white; font-family: 'Montserrat'; font-size: 7.5pt; font-weight: bold; text-align: center; border: 0.5pt solid #fff; }

        .celda { font-size: 8pt; color: #000; text-align: center; vertical-align: middle; border: 0.5pt solid #ccc; padding: 6px 3px; word-wrap: break-word; }
        .izquierda { text-align: left; padding-left: 8px; }
        
        .matriz-suelo { background-color: #FFC000 !important; font-weight: bold; }
        .demora-morado { background-color: #7030A0 !important; color: white !important; font-weight: bold; }
        .status-rojo { background-color: #FF0000 !important; color: white !important; font-weight: bold; }
        .status-verde { background-color: #28a745 !important; color: white !important; font-weight: bold; }
        #mensaje { color: #7030A0; font-weight: bold; text-align: center; margin: 10px; }
    </style>
</head>
<body>

<div class="contenedor-tabla">
    <div id="mensaje">Cargando datos...</div>
    <table id="tabla-novlabsa" style="display:none;">
        <thead>
            <tr>
                <th class="h-morado" style="width: 30px;">No.</th>
                <th class="h-morado" style="width: 70px;">OTM</th>
                <th class="h-gris"   style="width: 170px;">Razón social</th>
                <th class="h-morado" style="width: 180px;">Sitio de muestreo</th>
                <th class="h-morado" style="width: 85px;">F. Muestreo</th>
                <th class="h-morado" style="width: 85px;">F. Ingreso</th>
                <th class="h-morado" style="width: 60px;">Matriz</th>
                <th class="h-morado" style="width: 60px;">Muestras</th>
                <th class="h-morado" style="width: 200px;">Parámetros</th>
                <th class="h-morado" style="width: 60px;">Demora</th>
                <th class="h-morado" style="width: 70px;">Entregado</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>
</div>

<script>
    const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSIJI6LlRVJeFDAZhLdb6VDu72yf1x39lbzYlh_JgX8UzES8RPWWklLoDPINWAqggRQ6hXllOKC6Y9K/pub?output=csv";

    async function cargarDatos() {
        try {
            const respuesta = await fetch(URL_CSV);
            if (!respuesta.ok) throw new Error("Error de red");
            const contenido = await respuesta.text();

            Papa.parse(contenido, {
                header: false,
                skipEmptyLines: true,
                complete: function(resultado) {
                    renderizarTabla(resultado.data);
                }
            });
        } catch (error) {
            document.getElementById('mensaje').innerHTML = "Error de CORS detectado. Usa Live Server.";
        }
    }

    function renderizarTabla(filas) {
        const tablaBody = document.getElementById('cuerpo-tabla');
        document.getElementById('mensaje').style.display = 'none';
        document.getElementById('tabla-novlabsa').style.display = 'table';
        tablaBody.innerHTML = ""; 

        // Empezamos en 1 para saltar encabezados
        for (let i = 1; i < filas.length; i++) {
            const c = filas[i];
            
            // FILTRO: Si la columna OTM (c[1]) y Razón Social (c[3]) están vacías, no mostrar la fila
            if (!c[1] || c[1].trim() === "" || !c[3] || c[3].trim() === "") {
                continue; 
            }

            const tr = document.createElement('tr');
            const entregado = (c[16] || "").trim().toUpperCase();
            let claseEntregado = (entregado === "NO") ? "status-rojo" : 
                                 (entregado === "SI" || entregado === "SÍ") ? "status-verde" : "";

            tr.innerHTML = `
                <td class="celda">${c[0] || ''}</td>
                <td class="celda">${c[1] || ''}</td>
                <td class="celda izquierda">${c[3] || ''}</td>
                <td class="celda izquierda">${c[4] || ''}</td>
                <td class="celda">${c[5] || ''}</td>
                <td class="celda">${c[6] || ''}</td>
                <td class="celda matriz-suelo">${c[7] || ''}</td>
                <td class="celda">${c[8] || ''}</td>
                <td class="celda izquierda" style="font-size: 7pt;">${c[9] || ''}</td>
                <td class="celda demora-morado">${c[15] || ''}</td>
                <td class="celda ${claseEntregado}">${c[16] || ''}</td>
            `;
            tablaBody.appendChild(tr);
        }
    }

    window.onload = cargarDatos;
</script>

</body>
</html>
